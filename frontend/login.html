<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TicketStadio — Accedi</title><link rel="stylesheet" href="css/style.css"><style>.auth-wrap{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem}.auth-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:2.25rem 2rem;width:100%;max-width:420px}.auth-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:700;text-align:center;margin-bottom:1.75rem;color:var(--dark)}.auth-logo span{color:var(--green)}.auth-footer{text-align:center;font-size:.875rem;color:var(--mid);margin-top:1.25rem}</style></head><body><nav class="navbar"><a class="navbar-brand" href="/index.html">Ticket<span>Stadio</span></a><div id="nav-admin" style="display:none"></div><div id="nav-user" style="display:none"></div><div id="nav-auth"><a href="/register.html" class="btn btn-primary btn-sm">Registrati</a></div></nav><div class="auth-wrap"><div class="auth-card"><div class="auth-logo">Ticket<span>Stadio</span></div><h1 style="font-size:1.1rem;font-weight:700;margin-bottom:1.5rem">Accedi al tuo account</h1><form onsubmit="handleLogin(event)" novalidate><div class="form-group"><label class="form-label">Email</label><input type="email" id="email" class="form-control" placeholder="tuo@email.it" required autocomplete="email"></div><div class="form-group"><label class="form-label">Password</label><input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"></div><button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">Accedi</button></form><div class="auth-footer">Non hai un account? <a href="/register.html">Registrati</a></div></div></div><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{if(isLoggedIn()&&getCurrentUser())window.location.href='/index.html';});</script></body></html>
