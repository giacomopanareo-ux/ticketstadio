<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TicketStadio — Abbonamenti</title><link rel="stylesheet" href="css/style.css"><style>.abb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}.abb-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.abb-head{background:var(--dark);color:var(--white);padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center}.abb-stagione{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700}.abb-body{padding:1.1rem 1.25rem}.abb-row{display:flex;justify-content:space-between;font-size:.875rem;padding:.3rem 0;border-bottom:1px solid var(--border)}.abb-row:last-child{border-bottom:none}.abb-foot{padding:.875rem 1.25rem;border-top:1px solid var(--border);background:#fafafa;display:flex;justify-content:flex-end}</style></head><body>
<nav class="navbar"><a class="navbar-brand" href="/index.html">Ticket<span>Stadio</span></a><div class="navbar-links"><a href="/index.html">Partite</a><a href="/abbonamenti.html" class="active">Abbonamenti</a><a href="/miei-biglietti.html">I miei biglietti</a></div><div id="nav-admin"><a href="/admin/dashboard.html">Admin</a></div><div id="nav-user"><span id="nav-email" style="color:#9ca3af;font-size:.85rem"></span><button class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151" onclick="logout()">Esci</button></div><div id="nav-auth"><a href="/login.html" class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151">Accedi</a><a href="/register.html" class="btn btn-primary btn-sm">Registrati</a></div></nav>
<main class="container" style="padding-top:2rem;padding-bottom:3rem">
<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem"><div><h1 class="page-title">I miei abbonamenti</h1><p class="page-sub">Abbonamenti stagionali attivi e scaduti</p></div><button class="btn btn-primary" onclick="openModal()">+ Nuovo abbonamento</button></div>
<div id="abb-container"><div class="loader-wrap"><div class="loader"></div></div></div>
</main>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal"><h2 class="modal-title">Nuovo abbonamento</h2><form onsubmit="submitAbb(event)" novalidate>
<div class="form-group"><label class="form-label">Settore</label><select id="settore-sel" class="form-control" required onchange="updatePrezzo()"><option value="">Seleziona…</option></select></div>
<div class="form-group"><label class="form-label">Stagione</label><input type="text" id="stagione" class="form-control" placeholder="es. 2024/2025" required><p class="form-hint">Formato AAAA/AAAA</p></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem"><div class="form-group"><label class="form-label">Data inizio</label><input type="date" id="d-inizio" class="form-control" required></div><div class="form-group"><label class="form-label">Data fine</label><input type="date" id="d-fine" class="form-control" required></div></div>
<div id="prezzo-preview" style="display:none" class="riepilogo"><div class="riepilogo-row"><span>Prezzo base</span><span id="m-base">—</span></div><div class="riepilogo-row total"><span>Abbonamento (×20)</span><span id="m-tot">—</span></div></div>
<div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">Annulla</button><button type="submit" class="btn btn-primary" id="btn-abb">Acquista abbonamento</button></div>
</form></div></div>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script>
<script>
let settori=[];
document.addEventListener('DOMContentLoaded',async()=>{requireAuth();updateNavbar();const anno=new Date().getFullYear();document.getElementById('stagione').value=anno+'/'+(anno+1);document.getElementById('d-inizio').value=anno+'-07-01';document.getElementById('d-fine').value=(anno+1)+'-06-30';await Promise.all([loadAbb(),loadSettori()]);});
async function loadAbb(){try{const a=await AbbonamentiAPI.getMiei();if(!a.length){showEmpty('abb-container','Nessun abbonamento. Acquistane uno!');return;}a.sort((x,y)=>y.stagione.localeCompare(x.stagione));document.getElementById('abb-container').innerHTML='<div class="abb-grid">'+a.map(x=>{const att=x.attivo||isAtt(x);return'<div class="abb-card"><div class="abb-head"><div><div class="abb-stagione">Stagione '+x.stagione+'</div><div style="font-size:.82rem;opacity:.7;margin-top:.2rem">'+((x.settore&&x.settore.nome)||x.settoreNome||'Settore')+'</div></div><span class="badge '+(att?'badge-valido':'badge-scaduta')+'">'+(att?'Attivo':'Scaduto')+'</span></div><div class="abb-body"><div class="abb-row"><span style="color:var(--mid)">Dal</span><span style="font-weight:600">'+formatDateShort(x.dataInizio)+'</span></div><div class="abb-row"><span style="color:var(--mid)">Al</span><span style="font-weight:600">'+formatDateShort(x.dataFine)+'</span></div><div class="abb-row"><span style="color:var(--mid)">Prezzo</span><span style="font-weight:600;color:var(--green)">'+formatPrice(x.prezzo)+'</span></div></div>'+(att?'<div class="abb-foot"><button class="btn btn-outline btn-sm" onclick="rinnova('+x.id+')">Rinnova</button></div>':'')+'</div>';}).join('')+'</div>';}catch(err){showError('abb-container',err.message);}}
function isAtt(a){if(!a.dataInizio||!a.dataFine)return false;const o=new Date();return o>=new Date(a.dataInizio)&&o<=new Date(a.dataFine);}
async function loadSettori(){try{settori=await SettoriAPI.getAll();const sel=document.getElementById('settore-sel');settori.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.nome+' — '+formatPrice(s.prezzoBase);o.dataset.p=s.prezzoBase;sel.appendChild(o);});}catch{}}
function updatePrezzo(){const sel=document.getElementById('settore-sel'),opt=sel.options[sel.selectedIndex];if(!opt||!opt.dataset.p){document.getElementById('prezzo-preview').style.display='none';return;}const pb=parseFloat(opt.dataset.p);document.getElementById('m-base').textContent=formatPrice(pb);document.getElementById('m-tot').textContent=formatPrice(pb*20);document.getElementById('prezzo-preview').style.display='block';}
function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.getElementById('settore-sel').value='';document.getElementById('prezzo-preview').style.display='none';}
async function rinnova(id){if(!confirm('Rinnovare alla stagione successiva?'))return;try{await AbbonamentiAPI.rinnova(id);showToast('Abbonamento rinnovato!','success');await loadAbb();}catch(err){showToast(err.message,'error');}}
async function submitAbb(event){event.preventDefault();const sid=document.getElementById('settore-sel').value,stagione=document.getElementById('stagione').value,di=document.getElementById('d-inizio').value,df=document.getElementById('d-fine').value,btn=document.getElementById('btn-abb');if(!sid){showToast('Seleziona un settore','error');return;}btn.disabled=true;btn.textContent='Acquisto…';try{await AbbonamentiAPI.sottoscrivi({settoreId:parseInt(sid),stagione,dataInizio:di,dataFine:df});showToast('Abbonamento acquistato!','success');closeModal();await loadAbb();}catch(err){showToast(err.message,'error');}finally{btn.disabled=false;btn.textContent='Acquista abbonamento';}}
</script></body></html>
