<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TicketStadio — Admin Partite</title><link rel="stylesheet" href="../css/style.css"><style>.admin-nav{display:flex;gap:.75rem;margin-bottom:1.75rem;flex-wrap:wrap}.actions{display:flex;gap:.5rem;flex-wrap:wrap}</style></head><body>
<nav class="navbar"><a class="navbar-brand" href="/index.html">Ticket<span>Stadio</span></a><div class="navbar-links"><a href="/index.html">Sito pubblico</a></div><div id="nav-admin"><a href="/admin/dashboard.html">Admin</a></div><div id="nav-user"><span id="nav-email" style="color:#9ca3af;font-size:.85rem"></span><button class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151" onclick="logout()">Esci</button></div><div id="nav-auth" style="display:none"></div></nav>
<main class="container" style="padding-top:2rem;padding-bottom:3rem">
<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem"><div><h1 class="page-title">Gestione partite</h1><p class="page-sub">Crea, modifica e annulla le partite</p></div><button class="btn btn-primary" onclick="openModal()">+ Nuova partita</button></div>
<div class="admin-nav"><a href="/admin/dashboard.html" class="btn btn-outline btn-sm">Dashboard</a><a href="/admin/partite.html" class="btn btn-primary btn-sm">Partite</a><a href="/admin/promozioni.html" class="btn btn-outline btn-sm">Promozioni</a></div>
<div class="filters" style="margin-bottom:1rem"><select id="filter-stato" onchange="applyFilter()"><option value="">Tutti gli stati</option><option value="PROGRAMMATA" selected>Programmate</option><option value="IN_CORSO">In corso</option><option value="CONCLUSA">Concluse</option><option value="ANNULLATA">Annullate</option></select><span id="count-label" style="font-size:.85rem;color:var(--mid);margin-left:auto"></span></div>
<div class="card" id="partite-table"><div class="loader-wrap"><div class="loader"></div></div></div>
</main>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal"><h2 class="modal-title" id="modal-title">Nuova partita</h2><form onsubmit="submitPartita(event)" novalidate><input type="hidden" id="partita-id">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem"><div class="form-group"><label class="form-label">Squadra casa</label><select id="sq-casa" class="form-control" required><option value="">Seleziona…</option></select></div><div class="form-group"><label class="form-label">Squadra ospite</label><select id="sq-ospite" class="form-control" required><option value="">Seleziona…</option></select></div></div>
<div class="form-group"><label class="form-label">Data e ora</label><input type="datetime-local" id="data-ora" class="form-control" required></div>
<div class="form-group"><label class="form-label">Stato</label><select id="stato-sel" class="form-control"><option value="PROGRAMMATA">Programmata</option><option value="IN_CORSO">In corso</option><option value="CONCLUSA">Conclusa</option><option value="ANNULLATA">Annullata</option></select></div>
<p id="err-sq" class="form-error" style="display:none">Le squadre non possono essere uguali.</p>
<div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">Annulla</button><button type="submit" class="btn btn-primary" id="btn-partita">Salva</button></div>
</form></div></div>
<script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
let allP=[],squadre=[];
document.addEventListener('DOMContentLoaded',async()=>{requireAdmin();updateNavbar();await Promise.all([loadPartite(),loadSquadre()]);});
async function loadPartite(){try{allP=await PartiteAPI.getAll();applyFilter();}catch(err){showError('partite-table',err.message);}}
async function loadSquadre(){try{const p=await PartiteAPI.getAll();const m=new Map();p.forEach(x=>{m.set(x.squadraCasaId,{id:x.squadraCasaId,nome:x.squadraCasaNome});m.set(x.squadraOspiteId,{id:x.squadraOspiteId,nome:x.squadraOspiteNome});});squadre=[...m.values()].sort((a,b)=>a.nome.localeCompare(b.nome));['sq-casa','sq-ospite'].forEach(id=>{const sel=document.getElementById(id);squadre.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.nome;sel.appendChild(o);});});}catch{}}
function applyFilter(){const s=document.getElementById('filter-stato').value;const f=allP.filter(p=>!s||p.stato===s).sort((a,b)=>new Date(b.dataOra)-new Date(a.dataOra));document.getElementById('count-label').textContent=f.length+' partite';if(!f.length){showEmpty('partite-table','Nessuna partita trovata.');return;}document.getElementById('partite-table').innerHTML='<div class="table-wrap"><table><thead><tr><th>#</th><th>Partita</th><th>Data</th><th>Stato</th><th>Azioni</th></tr></thead><tbody>'+f.map(p=>'<tr><td style="color:var(--mid);font-size:.82rem">'+p.id+'</td><td style="font-weight:600">'+p.squadraCasaNome+' <span style="color:var(--mid);font-weight:400">vs</span> '+p.squadraOspiteNome+'</td><td style="font-size:.875rem">'+formatDateShort(p.dataOra)+' '+formatTime(p.dataOra)+'</td><td>'+statoPartitaBadge(p.stato)+'</td><td><div class="actions"><button class="btn btn-outline btn-sm" onclick="editPartita('+p.id+')">Modifica</button>'+(p.stato!='ANNULLATA'&&p.stato!='CONCLUSA'?'<button class="btn btn-danger btn-sm" onclick="annullaPartita('+p.id+')">Annulla</button>':'')+'</div></td></tr>').join('')+'</tbody></table></div>';}
function openModal(p=null){document.getElementById('modal-title').textContent=p?'Modifica partita':'Nuova partita';document.getElementById('partita-id').value=p?.id||'';document.getElementById('sq-casa').value=p?.squadraCasaId||'';document.getElementById('sq-ospite').value=p?.squadraOspiteId||'';document.getElementById('stato-sel').value=p?.stato||'PROGRAMMATA';document.getElementById('data-ora').value=p?.dataOra?p.dataOra.slice(0,16):'';document.getElementById('err-sq').style.display='none';document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.getElementById('partita-id').value='';}
function editPartita(id){openModal(allP.find(p=>p.id===id));}
async function annullaPartita(id){if(!confirm('Annullare questa partita? I biglietti venduti verranno invalidati.'))return;try{await PartiteAPI.annulla(id);showToast('Partita annullata.','success');await loadPartite();}catch(err){showToast(err.message,'error');}}
async function submitPartita(event){event.preventDefault();const cId=document.getElementById('sq-casa').value,oId=document.getElementById('sq-ospite').value;if(cId&&oId&&cId===oId){document.getElementById('err-sq').style.display='block';return;}document.getElementById('err-sq').style.display='none';const id=document.getElementById('partita-id').value,btn=document.getElementById('btn-partita');btn.disabled=true;btn.textContent='Salvataggio…';const payload={squadraCasaId:parseInt(cId),squadraOspiteId:parseInt(oId),dataOra:document.getElementById('data-ora').value,stato:document.getElementById('stato-sel').value};try{if(id){await PartiteAPI.aggiorna(parseInt(id),payload);showToast('Partita aggiornata.','success');}else{await PartiteAPI.crea(payload);showToast('Partita creata.','success');}closeModal();await loadPartite();}catch(err){showToast(err.message,'error');}finally{btn.disabled=false;btn.textContent='Salva';}}
</script></body></html>
