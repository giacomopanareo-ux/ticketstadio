<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TicketStadio — Admin Dashboard</title><link rel="stylesheet" href="../css/style.css"><style>.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}.stat-label{font-size:.8rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.05em}.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:700;margin-top:.35rem}.admin-nav{display:flex;gap:.75rem;margin-bottom:1.75rem;flex-wrap:wrap}</style></head><body>
<nav class="navbar"><a class="navbar-brand" href="/index.html">Ticket<span>Stadio</span></a><div class="navbar-links"><a href="/index.html">Sito pubblico</a></div><div id="nav-admin"><a href="/admin/dashboard.html">Admin</a></div><div id="nav-user"><span id="nav-email" style="color:#9ca3af;font-size:.85rem"></span><button class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151" onclick="logout()">Esci</button></div><div id="nav-auth" style="display:none"></div></nav>
<main class="container" style="padding-top:2rem;padding-bottom:3rem">
<div class="page-header"><h1 class="page-title">Dashboard admin</h1><p class="page-sub">Panoramica vendite e gestione sistema</p></div>
<div class="admin-nav"><a href="/admin/dashboard.html" class="btn btn-primary btn-sm">Dashboard</a><a href="/admin/partite.html" class="btn btn-outline btn-sm">Partite</a><a href="/admin/promozioni.html" class="btn btn-outline btn-sm">Promozioni</a></div>
<div class="stats-grid" id="stats-grid"><div class="loader-wrap" style="grid-column:1/-1"><div class="loader"></div></div></div>
<h2 style="font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:1rem">Vendite per partita</h2>
<div class="card" id="vendite-table"><div class="loader-wrap"><div class="loader"></div></div></div>
</main>
<script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{requireAdmin();updateNavbar();try{const d=await AdminAPI.getStatisticheVendite();document.getElementById('stats-grid').innerHTML='<div class="stat-card"><div class="stat-label">Biglietti venduti</div><div class="stat-value">'+(d.totaleBiglietti||0)+'</div></div><div class="stat-card"><div class="stat-label">Incasso totale</div><div class="stat-value" style="color:var(--green)">'+formatPrice(d.incassoTotale||0)+'</div></div><div class="stat-card"><div class="stat-label">Abbonamenti</div><div class="stat-value">'+(d.abbonamenti||0)+'</div></div><div class="stat-card"><div class="stat-label">Partite programmate</div><div class="stat-value">'+(d.partiteProgrammate||0)+'</div></div>';const rows=d.perPartita||[];document.getElementById('vendite-table').innerHTML=rows.length?'<div class="table-wrap"><table><thead><tr><th>Partita</th><th>Data</th><th>Biglietti</th><th>Incasso</th><th>Stato</th></tr></thead><tbody>'+rows.map(r=>'<tr><td style="font-weight:600">'+r.squadraCasa+' vs '+r.squadraOspite+'</td><td style="font-size:.85rem">'+formatDateShort(r.dataOra)+'</td><td>'+r.bigliettiVenduti+'</td><td style="color:var(--green);font-weight:600">'+formatPrice(r.incasso)+'</td><td>'+statoPartitaBadge(r.stato)+'</td></tr>').join('')+'</tbody></table></div>':'<div class="empty-state"><p>Nessun dato disponibile.</p></div>';}catch(err){showError('stats-grid',err.message);}});
</script></body></html>
