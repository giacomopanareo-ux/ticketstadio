<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TicketStadio — Admin Promozioni</title><link rel="stylesheet" href="../css/style.css"><style>.admin-nav{display:flex;gap:.75rem;margin-bottom:1.75rem;flex-wrap:wrap}.promo-code{font-family:monospace;font-size:.95rem;font-weight:700;letter-spacing:.08em;background:#f3f4f6;padding:.2rem .5rem;border-radius:4px}.sconto-pill{display:inline-block;background:#d1fae5;color:#065f46;font-weight:700;font-size:.82rem;padding:.2rem .6rem;border-radius:20px}</style></head><body>
<nav class="navbar"><a class="navbar-brand" href="/index.html">Ticket<span>Stadio</span></a><div class="navbar-links"><a href="/index.html">Sito pubblico</a></div><div id="nav-admin"><a href="/admin/dashboard.html">Admin</a></div><div id="nav-user"><span id="nav-email" style="color:#9ca3af;font-size:.85rem"></span><button class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151" onclick="logout()">Esci</button></div><div id="nav-auth" style="display:none"></div></nav>
<main class="container" style="padding-top:2rem;padding-bottom:3rem">
<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem"><div><h1 class="page-title">Gestione promozioni</h1><p class="page-sub">Crea e gestisci codici sconto</p></div><button class="btn btn-primary" onclick="openModal()">+ Nuova promozione</button></div>
<div class="admin-nav"><a href="/admin/dashboard.html" class="btn btn-outline btn-sm">Dashboard</a><a href="/admin/partite.html" class="btn btn-outline btn-sm">Partite</a><a href="/admin/promozioni.html" class="btn btn-primary btn-sm">Promozioni</a></div>
<div class="filters" style="margin-bottom:1rem"><select id="filter-stato" onchange="applyFilter()"><option value="">Tutte</option><option value="attiva" selected>Attive</option><option value="scaduta">Scadute</option></select><span id="count-label" style="font-size:.85rem;color:var(--mid);margin-left:auto"></span></div>
<div class="card" id="promo-table"><div class="loader-wrap"><div class="loader"></div></div></div>
</main>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal"><h2 class="modal-title">Nuova promozione</h2><form onsubmit="submitPromo(event)" novalidate>
<div class="form-group"><label class="form-label">Codice</label><div style="display:flex;gap:.5rem"><input type="text" id="codice" class="form-control" placeholder="es. ESTATE20" maxlength="20" required style="text-transform:uppercase;font-family:monospace;flex:1"><button type="button" class="btn btn-outline btn-sm" onclick="genera()">Genera</button></div></div>
<div class="form-group"><label class="form-label">Descrizione</label><input type="text" id="descr" class="form-control" placeholder="Descrizione opzionale"></div>
<div class="form-group"><label class="form-label">Sconto (%)</label><input type="number" id="sconto" class="form-control" min="1" max="100" step="1" placeholder="es. 15" required></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem"><div class="form-group"><label class="form-label">Dal</label><input type="date" id="d-ini" class="form-control" required></div><div class="form-group"><label class="form-label">Al</label><input type="date" id="d-fin" class="form-control" required></div></div>
<div class="form-group"><label class="form-label">Partita specifica (opzionale)</label><select id="partita-sel" class="form-control"><option value="">Valida per tutte le partite</option></select></div>
<div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">Annulla</button><button type="submit" class="btn btn-primary" id="btn-promo">Crea promozione</button></div>
</form></div></div>
<script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script>
let allPromo=[];
document.addEventListener('DOMContentLoaded',async()=>{requireAdmin();updateNavbar();const o=new Date(),fi=new Date();fi.setDate(fi.getDate()+30);document.getElementById('d-ini').value=o.toISOString().slice(0,10);document.getElementById('d-fin').value=fi.toISOString().slice(0,10);await Promise.all([loadPromo(),loadPartite()]);});
async function loadPromo(){try{allPromo=await PromozioniAPI.getAll();applyFilter();}catch(err){showError('promo-table',err.message);}}
async function loadPartite(){try{const p=await PartiteAPI.getAll();const sel=document.getElementById('partita-sel');p.filter(x=>x.stato==='PROGRAMMATA').sort((a,b)=>new Date(a.dataOra)-new Date(b.dataOra)).forEach(x=>{const o=document.createElement('option');o.value=x.id;o.textContent=x.squadraCasaNome+' vs '+x.squadraOspiteNome+' – '+formatDateShort(x.dataOra);sel.appendChild(o);});}catch{}}
function statoP(p){const o=new Date(),i=new Date(p.dataInizio),f=new Date(p.dataFine);if(o<i)return'futura';if(o>f)return'scaduta';return'attiva';}
function applyFilter(){const fil=document.getElementById('filter-stato').value;let f=allPromo.filter(p=>{const s=statoP(p);if(!fil)return true;if(fil==='attiva')return s==='attiva'||s==='futura';if(fil==='scaduta')return s==='scaduta';return true;}).sort((a,b)=>new Date(b.dataInizio)-new Date(a.dataInizio));document.getElementById('count-label').textContent=f.length+' promozioni';if(!f.length){showEmpty('promo-table','Nessuna promozione trovata.');return;}document.getElementById('promo-table').innerHTML='<div class="table-wrap"><table><thead><tr><th>Codice</th><th>Sconto</th><th>Validità</th><th>Partita</th><th>Stato</th><th></th></tr></thead><tbody>'+f.map(p=>{const s=statoP(p);const bc=s==='attiva'?'badge-valido':s==='futura'?'badge-programmata':'badge-scaduta';return'<tr><td><span class="promo-code">'+p.codice+'</span></td><td><span class="sconto-pill">-'+p.scontoPercentuale+'%</span></td><td style="font-size:.82rem">'+formatDateShort(p.dataInizio)+' → '+formatDateShort(p.dataFine)+'</td><td style="font-size:.82rem">'+(p.partitaNome||'<span style="color:var(--mid)">Tutte</span>')+'</td><td><span class="badge '+bc+'">'+s+'</span></td><td>'+(s!=='scaduta'?'<button class="btn btn-danger btn-sm" onclick="disattiva('+p.id+',&#39;'+p.codice+'&#39;)">Disattiva</button>':'')+'</td></tr>';}).join('')+'</tbody></table></div>';}
async function disattiva(id,codice){if(!confirm('Disattivare "'+codice+'"?'))return;try{await PromozioniAPI.disattiva(id);showToast('Promozione disattivata.','success');await loadPromo();}catch(err){showToast(err.message,'error');}}
function genera(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';document.getElementById('codice').value=Array.from({length:8},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.getElementById('codice').value='';}
async function submitPromo(event){event.preventDefault();const codice=document.getElementById('codice').value.trim().toUpperCase(),sconto=parseFloat(document.getElementById('sconto').value),di=document.getElementById('d-ini').value,df=document.getElementById('d-fin').value,pid=document.getElementById('partita-sel').value,btn=document.getElementById('btn-promo');if(!codice){showToast('Inserisci un codice','error');return;}if(isNaN(sconto)||sconto<1||sconto>100){showToast('Sconto tra 1 e 100','error');return;}btn.disabled=true;btn.textContent='Creazione…';try{await PromozioniAPI.crea({codice,descrizione:document.getElementById('descr').value.trim()||null,scontoPercentuale:sconto,dataInizio:di,dataFine:df,partitaId:pid?parseInt(pid):null});showToast('Promozione creata!','success');closeModal();await loadPromo();}catch(err){showToast(err.message,'error');}finally{btn.disabled=false;btn.textContent='Crea promozione';}}
</script></body></html>
