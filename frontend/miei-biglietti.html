<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TicketStadio — I miei biglietti</title><link rel="stylesheet" href="css/style.css"></head><body><nav class="navbar"><a class="navbar-brand" href="/index.html">Ticket<span>Stadio</span></a><div class="navbar-links"><a href="/index.html">Partite</a><a href="/abbonamenti.html">Abbonamenti</a><a href="/miei-biglietti.html" class="active">I miei biglietti</a></div><div id="nav-admin"><a href="/admin/dashboard.html">Admin</a></div><div id="nav-user"><span id="nav-email" style="color:#9ca3af;font-size:.85rem"></span><button class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151" onclick="logout()">Esci</button></div><div id="nav-auth"><a href="/login.html" class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151">Accedi</a><a href="/register.html" class="btn btn-primary btn-sm">Registrati</a></div></nav><main class="container" style="padding-top:2rem;padding-bottom:3rem"><div class="page-header"><h1 class="page-title">I miei biglietti</h1><p class="page-sub">Storico acquisti</p></div><div id="biglietti-container"><div class="loader-wrap"><div class="loader"></div></div></div></main><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script><script>document.addEventListener('DOMContentLoaded',async()=>{requireAuth();updateNavbar();try{const b=await BigliettiAPI.getMiei();if(!b.length){showEmpty('biglietti-container','Non hai ancora acquistato biglietti.');return;}b.sort((a,c)=>new Date(c.dataAcquisto)-new Date(a.dataAcquisto));document.getElementById('biglietti-container').innerHTML='<div class="card"><div class="table-wrap"><table><thead><tr><th>#</th><th>Partita</th><th>Data</th><th>Posto</th><th>Prezzo</th><th>Stato</th></tr></thead><tbody>'+b.map(x=>`<tr><td style="color:var(--mid);font-size:.82rem">#${x.id}</td><td style="font-weight:600">${x.squadraCasaNome} vs ${x.squadraOspiteNome}</td><td>${formatDateShort(x.dataPartita)} ${formatTime(x.dataPartita)}</td><td style="font-family:monospace">${x.settoreNome} · ${x.filaP}${x.numeroPosto}</td><td style="font-weight:600;color:var(--green)">${formatPrice(x.prezzoPagato)}</td><td><span class="badge badge-${x.stato.toLowerCase()}">${x.stato.toLowerCase()}</span></td></tr>`).join('')+'</tbody></table></div></div>';}catch(err){showError('biglietti-container',err.message);}});</script></body></html>
