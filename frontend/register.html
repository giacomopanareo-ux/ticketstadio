<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TicketStadio — Registrati</title><link rel="stylesheet" href="css/style.css"><style>.auth-wrap{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem}.auth-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:2.25rem 2rem;width:100%;max-width:460px}.auth-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:700;text-align:center;margin-bottom:1.75rem}.auth-logo span{color:var(--green)}.auth-footer{text-align:center;font-size:.875rem;color:var(--mid);margin-top:1.25rem}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.pwd-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:.4rem}.pwd-bar-inner{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}</style></head><body><nav class="navbar"><a class="navbar-brand" href="/index.html">Ticket<span>Stadio</span></a><div id="nav-admin" style="display:none"></div><div id="nav-user" style="display:none"></div><div id="nav-auth"><a href="/login.html" class="btn btn-outline btn-sm" style="color:#9ca3af;border-color:#374151">Accedi</a></div></nav><div class="auth-wrap"><div class="auth-card"><div class="auth-logo">Ticket<span>Stadio</span></div><h1 style="font-size:1.1rem;font-weight:700;margin-bottom:1.5rem">Crea il tuo account</h1><form onsubmit="handleRegister(event)" novalidate><div class="form-row"><div class="form-group"><label class="form-label">Nome</label><input type="text" id="nome" class="form-control" placeholder="Mario" required></div><div class="form-group"><label class="form-label">Cognome</label><input type="text" id="cognome" class="form-control" placeholder="Rossi" required></div></div><div class="form-group"><label class="form-label">Email</label><input type="email" id="email" class="form-control" placeholder="mario@email.it" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" id="password" class="form-control" placeholder="Minimo 6 caratteri" required minlength="6" oninput="checkPwd(this.value)"><div class="pwd-bar"><div class="pwd-bar-inner" id="pwd-bar"></div></div><p class="form-hint" id="pwd-hint"></p></div><div class="form-group"><label class="form-label">Conferma password</label><input type="password" id="confirm-password" class="form-control" placeholder="Ripeti la password" required></div><button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">Registrati</button></form><div class="auth-footer">Hai già un account? <a href="/login.html">Accedi</a></div></div></div><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{if(isLoggedIn()&&getCurrentUser())window.location.href='/index.html';});function checkPwd(v){const b=document.getElementById('pwd-bar'),h=document.getElementById('pwd-hint');let s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^a-zA-Z0-9]/.test(v))s++;const lv=[{p:'20%',c:'#dc2626',l:'Troppo corta'},{p:'40%',c:'#d97706',l:'Debole'},{p:'60%',c:'#ca8a04',l:'Accettabile'},{p:'80%',c:'#16a34a',l:'Buona'},{p:'100%',c:'#15803d',l:'Ottima'}][Math.min(s,4)];b.style.width=lv.p;b.style.background=lv.c;h.textContent=v.length?lv.l:'';h.style.color=lv.c;}</script></body></html>
