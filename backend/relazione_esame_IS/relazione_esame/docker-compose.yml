# ────────────────────────────────────────────────────────────
# docker-compose.yml — TicketStadio full stack
#
# Avvia in un colpo solo:
#   - MySQL 8.0 con schema TicketStadio inizializzato
#   - Backend Spring Boot collegato al DB
#
# Comandi:
#   docker compose up -d        # avvia in background
#   docker compose logs -f      # segui i log
#   docker compose down         # ferma tutto
#   docker compose down -v      # ferma e rimuove anche i volumi (reset DB)
# ────────────────────────────────────────────────────────────

services:

  # ─── Database MySQL ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ticketstadio-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ticketstadio
      MYSQL_USER: ticketuser
      MYSQL_PASSWORD: ticketpass
      TZ: Europe/Rome
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Lo script SQL viene eseguito automaticamente al primo avvio
      - ./db/ticketstadio_demo.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Spring Boot ─────────────────────────────────
  backend:
    build: .
    container_name: ticketstadio-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ticketstadio?useSSL=false&serverTimezone=Europe/Rome&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ticketuser
      SPRING_DATASOURCE_PASSWORD: ticketpass
      JWT_SECRET: SOSTITUISCI_CON_CHIAVE_BASE64_32_BYTE_PER_PRODUZIONE
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"

volumes:
  mysql-data:
