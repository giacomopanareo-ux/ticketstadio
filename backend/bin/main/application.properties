spring.config.import=optional:file:./application-local.properties

server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/ticketstadio?useSSL=false&serverTimezone=Europe/Rome&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:cambia_questa_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=true
jwt.secret=${JWT_SECRET:SOSTITUISCI_CON_CHIAVE_BASE64_32_BYTE_openssl_rand_base64_32}
jwt.expiration=86400000
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Rome
logging.level.it.unife.ticketstadio=DEBUG
